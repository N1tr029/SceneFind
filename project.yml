name: SceneFind
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  SceneFind:
    type: application
    platform: iOS
    sources:
      - SceneFindApp
      - Shared
    resources:
      - SceneFindApp/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.SceneFind
        INFOPLIST_FILE: SceneFindApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: SceneFindApp/SceneFind.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: SceneFindShareExtension
        embed: true
  SceneFindShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - SceneFindShareExtension
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.SceneFind.ShareExtension
        INFOPLIST_FILE: SceneFindShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: SceneFindShareExtension/SceneFindShareExtension.entitlements
  SceneFindTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SceneFindTests
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.SceneFindTests
        INFOPLIST_FILE: SceneFindTests/Info.plist
    dependencies:
      - target: SceneFind
