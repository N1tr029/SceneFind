name: SceneFind
configs:
  Debug: debug
  Release: release
  TestFlight: release
options:
  bundleIdPrefix: com.kavigandham
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: T4VT6R837D
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "7"
  configs:
    TestFlight:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) SCENEFIND_TESTFLIGHT"
targets:
  SceneFind:
    type: application
    platform: iOS
    sources:
      - path: SceneFindApp
        excludes:
          - Resources/PrototypeSecrets.plist
      - Shared
    postBuildScripts:
      - name: Embed Local Prototype Secrets
        basedOnDependencyAnalysis: false
        script: |
          SECRETS_FILE="${SRCROOT}/SceneFindApp/Resources/PrototypeSecrets.plist"
          BUNDLE_PATH="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          if [ "${CONFIGURATION}" = "Debug" ] && [ -f "${SECRETS_FILE}" ]; then
            mkdir -p "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
            cp "${SECRETS_FILE}" "${BUNDLE_PATH}/PrototypeSecrets.plist"
          else
            rm -f "${BUNDLE_PATH}/PrototypeSecrets.plist"
            if [ -f "${BUNDLE_PATH}/PrototypeSecrets.plist" ]; then
              echo "error: Release build contains PrototypeSecrets.plist"
              exit 1
            fi
            if grep -R -a -E -q '(gsk_[A-Za-z0-9_-]{20,}|AQ\.[A-Za-z0-9_-]{20,}|sk-[A-Za-z0-9_-]{20,})' "${TARGET_BUILD_DIR}/${WRAPPER_NAME}"; then
              echo "error: Release build appears to contain a provider secret"
              exit 1
            fi
          fi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kavigandham.scenefind
        INFOPLIST_FILE: SceneFindApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: SceneFindApp/SceneFind.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: SceneFindShareExtension
        embed: true
  SceneFindShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - SceneFindShareExtension
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kavigandham.scenefind.ShareExtension
        INFOPLIST_FILE: SceneFindShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: SceneFindShareExtension/SceneFindShareExtension.entitlements
  SceneFindTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SceneFindTests
      - Shared
      - SceneFindApp/Services/DailyUsageLimiter.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kavigandham.scenefindTests
        INFOPLIST_FILE: SceneFindTests/Info.plist
    dependencies:
      - target: SceneFind
schemes:
  SceneFind:
    build:
      targets:
        SceneFind: all
        SceneFindTests: [test]
    run:
      config: Debug
      storeKitConfiguration: SceneFindApp/Resources/SceneFind.storekit
    archive:
      config: TestFlight
      customArchiveName: SceneFind
    test:
      config: Debug
      targets:
        - SceneFindTests
  SceneFindLiveRegression:
    build:
      targets:
        SceneFind: all
        SceneFindTests: [test]
    test:
      config: Debug
      targets:
        - SceneFindTests
      environmentVariables:
        SCENEFIND_RUN_LIVE_CORPUS: "1"
  SceneFindTestFlight:
    build:
      targets:
        SceneFind: all
    run:
      config: TestFlight
    archive:
      config: TestFlight
      customArchiveName: SceneFind
