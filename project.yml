name: SceneFind
options:
  bundleIdPrefix: com.kavigandham
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: T4VT6R837D
    CODE_SIGN_STYLE: Automatic
targets:
  SceneFind:
    type: application
    platform: iOS
    sources:
      - path: SceneFindApp
        excludes:
          - Resources/PrototypeSecrets.plist
      - Shared
    postBuildScripts:
      - name: Embed Local Prototype Secrets
        basedOnDependencyAnalysis: false
        script: |
          SECRETS_FILE="${SRCROOT}/SceneFindApp/Resources/PrototypeSecrets.plist"
          if [ -f "${SECRETS_FILE}" ]; then
            mkdir -p "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
            cp "${SECRETS_FILE}" "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/PrototypeSecrets.plist"
          fi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kavigandham.scenefind
        INFOPLIST_FILE: SceneFindApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: SceneFindApp/SceneFind.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: SceneFindShareExtension
        embed: true
  SceneFindShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - SceneFindShareExtension
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kavigandham.scenefind.ShareExtension
        INFOPLIST_FILE: SceneFindShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: SceneFindShareExtension/SceneFindShareExtension.entitlements
  SceneFindTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SceneFindTests
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kavigandham.scenefind.Tests
        INFOPLIST_FILE: SceneFindTests/Info.plist
    dependencies:
      - target: SceneFind
